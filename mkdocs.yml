site_name: AI-асистент CEO
site_url: https://ceo-assistant.remilink.com/
site_description: Готові промпти та сценарії, як перетворити ChatGPT або Claude на персонального асистента CEO — з доступом до пошти, календаря, CRM і документів.
site_author: Remilink
copyright: >
  Зроблено в <a href="https://remilink.com" target="_blank" rel="noopener">Remilink</a> —
  доводимо AI-проєкти до продакшену ·
  <a href="mailto:hello@remilink.com">hello@remilink.com</a> ·
  <a href="https://remilink.com/book-a-call" target="_blank" rel="noopener">Feasibility Call</a>

repo_url: https://github.com/remilink/ceo-assistant
repo_name: remilink/ceo-assistant
edit_uri: edit/main/docs/

theme:
  name: material
  language: uk
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Темна тема
    - scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Світла тема
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

nav:
  - Початок:
      - Вступ: index.md
      - Швидкий старт: quick-start.md
  - Сценарії:
      - Огляд: scenarios/index.md
      - Ранковий бриф CEO: scenarios/rankovyi-bryf.md
      - Підсумок тижня: scenarios/pidsumok-tyzhnia.md
      - Моніторинг конкурентів: scenarios/monitoryng-konkurentiv.md
      - Моніторинг новин про компанію: scenarios/monitoryng-novyn.md
      - Оновлення звіту на Google Drive: scenarios/onovlennia-zvitu.md
      - Досьє клієнта: scenarios/dosie-kliienta.md
      - Чернетка листа: scenarios/chernetka-lysta.md
      - Відкриті домовленості: scenarios/vidkryti-domovlenosti.md
      - Підготовка до зустрічі: scenarios/pidgotovka-do-zustrichi.md
  - Автоматизація:
      - Регулярні задачі: schedule.md
  - Більше:
      - Ідеї на майбутнє: future.md
      - Про нас: about.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      draggable: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.magiclink:
      repo_url_shortener: false
      social_url_shortener: false

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://remilink.com
      name: remilink.com
    - icon: fontawesome/solid/envelope
      link: mailto:hello@remilink.com
      name: hello@remilink.com
    - icon: fontawesome/brands/github
      link: https://github.com/remilink
      name: GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/scenarios-filter.js
