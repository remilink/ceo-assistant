site_name: AI асистент керівника для щоденних задач
site_url: https://ceo-assistant.remilink.com/
site_description: Агенти-асистенти для щоденної рутини керівника — готові промпти, сценарії та налаштування, щоб ChatGPT або Claude працювали з вашою поштою, календарем, CRM і документами.
site_author: remilink
copyright: >
  Зроблено в <a href="https://remilink.com/ua" target="_blank" rel="noopener">remilink</a>.
  Доводимо AI-проєкти до продакшену ·
  <a href="mailto:hello@remilink.com">hello@remilink.com</a> ·
  <a href="https://remilink.com/ua/book-a-call" target="_blank" rel="noopener">Feasibility Call</a>

repo_url: https://github.com/remilink/ceo-assistant
repo_name: remilink/ceo-assistant
edit_uri: edit/main/docs/

theme:
  name: material
  language: uk
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Темна тема
    - scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Світла тема
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

nav:
  - Головна: index.md
  - Готові сценарії: scenarios/index.md
  - Скіли: skills.md
  - Ідеї доручень: ideas.md
  - Налаштування:
      - Плагіни (конектори): plugins.md
      - Регулярні задачі (scheduled): schedule.md
      - Керування комп'ютером (cowork): cowork.md
      - Керування з мобільного (dispatch): mobile.md
  - Про нас: about.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      draggable: true
  # 301 old paths to their consolidated homes (scenarios folded into one page;
  # quick-start → plugins; future roadmap → ideas). True renames, per site hygiene.
  - redirects:
      redirect_maps:
        quick-start.md: plugins.md
        future.md: ideas.md
        scenarios/rankovyi-bryf.md: scenarios/index.md
        scenarios/pidsumok-tyzhnia.md: scenarios/index.md
        scenarios/monitoryng-konkurentiv.md: scenarios/index.md
        scenarios/monitoryng-novyn.md: scenarios/index.md
        scenarios/onovlennia-zvitu.md: scenarios/index.md
        scenarios/dosie-kliienta.md: scenarios/index.md
        scenarios/chernetka-lysta.md: scenarios/index.md
        scenarios/vidkryti-domovlenosti.md: scenarios/index.md
        scenarios/pidgotovka-do-zustrichi.md: scenarios/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.magiclink:
      repo_url_shortener: false
      social_url_shortener: false

extra:
  # Header remilink logo links to the main site (top-right brand), not the docs home.
  homepage: https://remilink.com/ua
  social:
    - icon: fontawesome/solid/globe
      link: https://remilink.com/ua
      name: remilink.com
    - icon: fontawesome/solid/envelope
      link: mailto:hello@remilink.com
      name: hello@remilink.com
    - icon: fontawesome/solid/phone
      link: tel:+380961122025
      name: +380 96 112 20 25
    - icon: fontawesome/brands/whatsapp
      link: https://wa.me/380961122025
      name: WhatsApp
    - icon: fontawesome/brands/telegram
      link: https://t.me/remilink_hello
      name: Telegram
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/remilink/
      name: LinkedIn
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/rl-interactive.js
